name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v3

      - name: Установить Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Установить зависимости
        run: npm install

      - name: Сборка проекта
        run: npm run build || echo "Нет сборки"

      - name: Запуск тестов
        run: npm test || echo "Нет тестов"

      - name: Деплой
        run: echo "Deploy completed"

